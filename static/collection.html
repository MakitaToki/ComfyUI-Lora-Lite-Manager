<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Collection Lite</title>
    <link rel="stylesheet" href="/lora-lite-static/collection_styles.css">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <h1>Collection Lite</h1>
            <p id="summary">正在读取作品集...</p>
        </div>
        <nav class="topbar-actions">
            <a class="button secondary" href="/lora-lite">LoRA 管理</a>
            <button id="refreshBtn" class="button secondary" type="button">刷新</button>
            <button id="exportBtn" class="button primary" type="button">导出 Creative Seeds</button>
        </nav>
    </header>

    <main class="layout">
        <section class="content">
            <section class="source-panel">
                <div class="source-panel-header">
                    <div>
                        <h2>收集素材</h2>
                        <p>Civitai 图片保留生成元数据，外部图片作为视觉参考。</p>
                    </div>
                </div>
                <form id="importForm" class="import-bar">
                    <label>
                        <span>Civitai 图片链接</span>
                        <input id="importUrl" placeholder="https://civitai.com/images/123456">
                    </label>
                    <label>
                        <span>名称</span>
                        <input id="importTitle" placeholder="例如：fox girl goldfish">
                    </label>
                    <button class="button primary" type="submit">导入</button>
                </form>

                <details class="manual-panel">
                    <summary>添加 Pinterest / 小红书 / 本地图片参考</summary>
                    <form id="manualForm" class="manual-form">
                    <label>
                        <span>素材类型</span>
                        <select id="manualAssetType">
                            <option value="photo_reference">摄影参考</option>
                            <option value="graphic_design_reference">平面设计参考</option>
                            <option value="ai_generation_reference">AI / 插画生成参考</option>
                        </select>
                    </label>
                    <label>
                        <span>平台</span>
                        <input id="manualPlatform" placeholder="pinterest / xiaohongshu / web / local">
                    </label>
                    <label>
                        <span>来源页面，可留空</span>
                        <input id="manualSourceUrl" placeholder="https://...">
                    </label>
                    <label>
                        <span>图片 URL</span>
                        <input id="manualImageUrl" placeholder="https://...jpg">
                    </label>
                    <label>
                        <span>本地图片路径，可替代图片 URL</span>
                        <input id="manualLocalPath" placeholder="填写完整路径，例如 C:\Users\Administrator\Pictures\ref.png">
                    </label>
                    <p class="field-hint full">本地图片路径需要填 Windows 完整绝对路径，不要只填插件目录片段；如果图片已经在缓存目录，也请从资源管理器地址栏复制完整路径。</p>
                    <label>
                        <span>主体 / 用途</span>
                        <input id="manualSubject" placeholder="例如：护肤品海报、室内摄影、角色立绘">
                    </label>
                    <label>
                        <span>构图 / 版式</span>
                        <input id="manualComposition" placeholder="例如：主体居中、大留白、标题左上">
                    </label>
                    <label>
                        <span>色彩 / 光影</span>
                        <input id="manualColorLighting" placeholder="例如：米白黑红，柔光，高调">
                    </label>
                    <label>
                        <span>设计语言 / 后期</span>
                        <input id="manualDesignLanguage" placeholder="例如：无衬线大标题、胶片颗粒、细线框">
                    </label>
                    <label class="full">
                        <span>关键词</span>
                        <input id="manualTags" placeholder="中文或英文标签，用逗号分隔">
                    </label>
                    <label class="full">
                        <span>备注</span>
                        <textarea id="manualNotes" rows="3" placeholder="这张图值得参考的地方"></textarea>
                    </label>
                        <button class="button primary" type="submit">保存参考</button>
                    </form>
                </details>
            </section>

            <div class="toolbar">
                <label class="search-box">
                    <span>搜索</span>
                    <input id="searchInput" type="search" placeholder="raw tags、prompt、作者、模型名">
                </label>
                <label class="select-box">
                    <span>排序</span>
                    <select id="sortSelect">
                        <option value="newest">发布时间新</option>
                        <option value="popular">热度高</option>
                        <option value="collected">收藏时间新</option>
                        <option value="oldest">发布时间旧</option>
                    </select>
                </label>
            </div>

            <div id="grid" class="masonry" aria-live="polite"></div>
            <div id="emptyState" class="empty" hidden>
                <strong>还没有收藏素材</strong>
                <span>先导入一条 Civitai 链接，或者添加一张外部视觉参考图。</span>
            </div>
        </section>

        <aside class="panel">
            <div class="panel-header">
                <div>
                    <h2 id="detailsTitle">选择作品</h2>
                    <p>查看提示词、tags 和模型引用</p>
                </div>
            </div>
            <div id="detailsBody" class="details-empty">从左侧作品卡片开始。</div>
        </aside>
    </main>

    <section id="exportDialog" class="dialog" hidden>
        <div class="dialog-card">
            <div class="panel-header">
                <div>
                    <h2>Creative Seeds</h2>
                    <p>这是给后续 OpenClaw 实验矩阵使用的结构化原料。</p>
                </div>
                <button id="closeExportBtn" class="icon-button" type="button" aria-label="关闭">x</button>
            </div>
            <textarea id="exportText" spellcheck="false"></textarea>
        </div>
    </section>

    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/lora-lite-static/collection_app.js"></script>
</body>
</html>
