<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LoRA Lite Manager</title>
    <link rel="stylesheet" href="/lora-lite-static/styles.css">
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <div class="brand-mark">L</div>
            <div>
                <h1>LoRA Lite Manager</h1>
                <p id="summary">正在读取本地 LoRA...</p>
            </div>
        </div>
        <nav class="main-tabs" aria-label="主菜单">
            <a class="tab active" href="/lora-lite">LoRA</a>
            <a class="tab" href="/collection-lite">作品集</a>
            <a class="tab" href="/recipe-lite">Recipe</a>
            <a class="tab" href="/experiments-lite">Experiment</a>
        </nav>
        <div class="topbar-actions">
            <button id="settingsBtn" class="icon-button" type="button" aria-label="设置" title="设置">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
                    <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.1 2.1 0 0 1-2.97 2.97l-.04-.04a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.65V21a2.1 2.1 0 0 1-4.2 0v-.06a1.8 1.8 0 0 0-1.1-1.65 1.8 1.8 0 0 0-1.98.36l-.04.04a2.1 2.1 0 0 1-2.97-2.97l.04-.04A1.8 1.8 0 0 0 3.8 15a1.8 1.8 0 0 0-1.65-1.1H2.1a2.1 2.1 0 0 1 0-4.2h.06A1.8 1.8 0 0 0 3.8 8.6a1.8 1.8 0 0 0-.36-1.98l-.04-.04A2.1 2.1 0 0 1 6.37 3.6l.04.04a1.8 1.8 0 0 0 1.98.36 1.8 1.8 0 0 0 1.1-1.65V2.1a2.1 2.1 0 0 1 4.2 0v.06a1.8 1.8 0 0 0 1.1 1.65 1.8 1.8 0 0 0 1.98-.36l.04-.04a2.1 2.1 0 0 1 2.97 2.97l-.04.04a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.65 1.1h.06a2.1 2.1 0 0 1 0 4.2h-.06A1.8 1.8 0 0 0 19.4 15Z"></path>
                </svg>
            </button>
            <button id="refreshBtn" class="button secondary" type="button">刷新</button>
            <button id="downloadPanelBtn" class="button primary" type="button">下载 LoRA</button>
        </div>
    </header>

    <main class="layout">
        <section class="content">
            <div class="toolbar">
                <label class="search-box">
                    <span>搜索</span>
                    <input id="searchInput" type="search" placeholder="名称、文件名、路径、触发词">
                </label>
                <label class="select-box">
                    <span>目录</span>
                    <select id="rootFilter">
                        <option value="">全部</option>
                    </select>
                </label>
            </div>
            <div id="grid" class="grid" aria-live="polite"></div>
            <div id="emptyState" class="empty" hidden>没有找到 LoRA。</div>
        </section>

        <aside id="detailsPanel" class="panel">
            <div class="panel-header">
                <div>
                    <h2 id="detailsTitle">选择一个 LoRA</h2>
                    <p id="detailsPath">查看和编辑元数据</p>
                </div>
            </div>
            <div id="detailsBody" class="details-empty">
                从左侧选择一张卡片，或者先点击刷新扫描本地模型。
            </div>
        </aside>
    </main>

    <section id="downloadDrawer" class="drawer" hidden>
        <div class="drawer-card">
            <div class="panel-header">
                <div>
                    <h2>下载 LoRA</h2>
                    <p>输入 Civitai modelVersionId，或带 modelVersionId 的链接。</p>
                </div>
                <button id="closeDownloadBtn" class="icon-button" type="button" aria-label="关闭">x</button>
            </div>
            <form id="downloadForm" class="form">
                <label>
                    <span>Civitai 链接或版本 ID</span>
                    <input id="downloadInput" required placeholder="例如：https://civitai.com/models/123?modelVersionId=456">
                </label>
                <label>
                    <span>保存根目录</span>
                    <select id="downloadRoot"></select>
                </label>
                <label>
                    <span>子目录，可留空</span>
                    <input id="downloadSubdir" placeholder="例如：characters">
                </label>
                <p id="downloadStatus" class="muted" hidden></p>
                <button id="downloadSubmitBtn" class="button primary" type="submit">开始下载</button>
            </form>
        </div>
    </section>

    <section id="settingsDrawer" class="drawer" hidden>
        <div class="drawer-card">
            <div class="panel-header">
                <div>
                    <h2>设置</h2>
                    <p>保存 Civitai API key 后，下载受限模型会自动带上认证。</p>
                </div>
                <button id="closeSettingsBtn" class="icon-button" type="button" aria-label="关闭">x</button>
            </div>
            <form id="settingsForm" class="form">
                <label>
                    <span>Civitai API key</span>
                    <input id="civitaiApiKeyInput" type="password" autocomplete="off" placeholder="粘贴你的 Civitai API key">
                </label>
                <p id="apiKeyStatus" class="field-note">尚未读取设置。</p>
                <div class="action-row">
                    <button class="button primary" type="submit">保存设置</button>
                    <button id="testApiKeyBtn" class="button secondary" type="button">测试 API key</button>
                </div>
            </form>
        </div>
    </section>

    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/lora-lite-static/app.js"></script>
</body>
</html>
